{{- if and .Values.auth.token (not .Values.auth.existingSecret) }}
# Dev convenience: materialise an inline token into a Secret. For production,
# create your own Secret and set auth.existingSecret instead of auth.token.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ndb.fullname" . }}-auth
  labels:
    {{- include "ndb.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.auth.token | quote }}
{{- end }}
