name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Full workspace test. Previously this ran only -p ndb-mcp-server / ndb-arrow
  # / ndb-server, which left the engine (the storage core, with the decoder
  # robustness/fuzz-lite suite), slicer, query, and renderer UNTESTED in CI —
  # a real OOM bug in the engine decoder once shipped because of it. Test the
  # whole workspace so every crate's suite gates merges.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test (whole workspace)
        run: cargo test --workspace
      - name: Decoder robustness suite (explicit)
        run: cargo test -p ndb-engine --test robustness

  # Lint gate. ADVISORY for now: there is a backlog of ~42 pre-existing
  # pedantic warnings in ndb-engine. `continue-on-error` keeps the signal
  # visible (the job surfaces the warnings) without blocking merges. Once the
  # backlog is cleared, drop `continue-on-error` and add `-D warnings` to make
  # this blocking so no NEW warnings can land.
  clippy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets

  # Portability guard: the store / index / export path must keep compiling for
  # NVIDIA DGX Spark (GB10 Grace Blackwell — aarch64). See docs/gpu-dgx-spark.md.
  aarch64-spark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add aarch64 target
        run: rustup target add aarch64-unknown-linux-gnu
      - name: Cross-check GPU-relevant crates for Grace ARM
        run: >
          cargo check --target aarch64-unknown-linux-gnu
          -p ndb-engine -p ndb-index-vector-hnsw -p ndb-arrow

  # Adoptable-core gate 1: the Docker image builds and serves /v1/health
  # within the 60s install budget (QUICKSTART path A, step 1).
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ndb:ci .
      - name: Run + probe /v1/health
        run: |
          docker run -d --name ndb -p 8742:8742 ndb:ci
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:8742/v1/health | grep -q '"ok"'; then
              echo "healthy after ${i}s"; docker rm -f ndb; exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy in 60s"; docker logs ndb; docker rm -f ndb; exit 1

  # Adoptable-core gate 2: the JS clients. @ndb/client typechecks, builds, and
  # passes its integration suite against a real server over /v1; @ndb/mcp's
  # launcher starts the MCP server and lists the nDB tools.
  js-clients:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - name: Build the binaries the launch/integration tests spawn
        run: cargo build -p ndb-server -p ndb-mcp-server
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: "@ndb/client"
        working-directory: clients/ts
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm test
      - name: "@ndb/mcp"
        working-directory: clients/mcp-npm
        run: npm test
