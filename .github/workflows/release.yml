name: release

# Cuts a release on a v* tag: prebuilt binaries, a multi-arch Docker image,
# and the npm SDK. Each job is independent so a failure in one doesn't block
# the others' artifacts.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # attach binaries to the GitHub Release
  packages: write   # push the image to GHCR

jobs:
  # ---- prebuilt binaries -------------------------------------------------
  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  name: linux-x86_64,  npmpkg: linux-x64,    npmos: linux,  npmcpu: x64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, name: linux-aarch64, npmpkg: linux-arm64,  npmos: linux,  npmcpu: arm64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,      name: macos-aarch64, npmpkg: darwin-arm64, npmos: darwin, npmcpu: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ndb-server -p ndb-cli -p ndb-mcp-server
      - name: Package
        run: |
          dir="ndb-${{ matrix.name }}"
          mkdir "$dir"
          cp target/${{ matrix.target }}/release/ndb-server target/${{ matrix.target }}/release/ndb-cli target/${{ matrix.target }}/release/ndb-mcp-server "$dir/"
          tar czf "$dir.tar.gz" "$dir"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ndb-${{ matrix.name }}.tar.gz
      # Per-platform npm package holding the MCP server binary. The @ndb/mcp
      # launcher resolves the one matching the host via optionalDependencies.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Assemble + publish @ndb/mcp-${{ matrix.npmpkg }}
        continue-on-error: true # non-blocking until NPM_TOKEN + @ndb org exist; binaries already attached above
        run: |
          ext=""; [ "${{ matrix.npmos }}" = "win32" ] && ext=".exe"
          pkg="ndb-mcp-${{ matrix.npmpkg }}"
          mkdir -p "$pkg/bin"
          cp "target/${{ matrix.target }}/release/ndb-mcp-server$ext" "$pkg/bin/"
          version="${GITHUB_REF_NAME#v}"
          cat > "$pkg/package.json" <<JSON
          {
            "name": "@ndb/mcp-${{ matrix.npmpkg }}",
            "version": "$version",
            "description": "nDB MCP server binary for ${{ matrix.npmpkg }}.",
            "license": "MIT",
            "os": ["${{ matrix.npmos }}"],
            "cpu": ["${{ matrix.npmcpu }}"],
            "files": ["bin"]
          }
          JSON
          (cd "$pkg" && npm publish --access public)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---- multi-arch Docker image ------------------------------------------
  docker:
    name: docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/goldrag1/ndb
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---- npm packages: @ndb/client + @ndb/mcp ------------------------------
  # Runs after `binaries` so the per-platform @ndb/mcp-* packages (which the
  # @ndb/mcp launcher depends on) are already on the registry.
  npm:
    name: npm @ndb/client + @ndb/mcp
    needs: binaries
    runs-on: ubuntu-latest
    # Non-blocking until the @ndb npm org + NPM_TOKEN secret exist. The image
    # (docker job) + release binaries (binaries job) still publish without it;
    # re-run this job once npm is set up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish @ndb/client
        working-directory: clients/ts
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @ndb/mcp
        working-directory: clients/mcp-npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
